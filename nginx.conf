server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    # HTML: immer frisch laden
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # JS + CSS: 1 Tag (Astro-hashed files profitieren trotzdem, kein immutable-Risiko)
    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Bilder + Fonts: Browser muss IMMER beim Server nachfragen ob sich was geändert hat
    # no-cache = nie ohne Rückfrage zeigen, must-revalidate = auch bei Netzwerk-Problemen keine alte Version
    location ~* \.(png|jpg|jpeg|gif|svg|webp|woff2)$ {
        add_header Cache-Control "no-cache, must-revalidate";
        etag on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
