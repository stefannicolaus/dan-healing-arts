server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    # HTML: immer frisch laden
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # JS + CSS: Astro hasht Dateinamen — 1 Jahr cachen
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Bilder + Fonts: no-cache (Browser revalidiert per ETag bei jedem Aufruf)
    # Grund: Bilder werden mit gleichem Dateinamen ausgetauscht — Browser muss immer prüfen
    location ~* \.(png|jpg|jpeg|gif|svg|webp|avif|woff2)$ {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
