server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    # HTML: immer frisch laden
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # JS + CSS: kein Cache
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Bilder + Fonts: no-cache + ETag (identisch zu CA — Browser revalidiert immer, ETag macht es schnell)
    location ~* \.(png|jpg|jpeg|gif|svg|webp|woff2)$ {
        add_header Cache-Control "no-cache";
        etag on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
