server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    # HTML: immer frisch laden
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # JS + CSS: 1 Tag (Astro-hashed files profitieren trotzdem, kein immutable-Risiko)
    location ~* \.(js|css)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    # Bilder + Fonts: 1 Tag, KEIN immutable
    # (Dateien werden mit gleichem Namen ersetzt — immutable blockiert Browser für 1 Jahr)
    location ~* \.(png|jpg|jpeg|gif|svg|woff2)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
