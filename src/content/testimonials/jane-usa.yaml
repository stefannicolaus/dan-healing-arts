name: "Jane"
location: "USA"
quote: "That course truly changed my life and I feel so blessed that I found Dan and his work in this lifetime. Light and healing is being spread through this, it is so powerful! Reconnecting with my son after the training has been so great. I feel like a new person, more of the present, joyous mom he deserves. With this work spreading around the world, I have so much hope for our futures."
