name: "Paige"
location: "USA"
quote: "I was deeply inspired by Dan's centeredness, calmness, directness, clarity and his capacity to be cutting when needed. He also expresses a profound capacity to be present, intuitive, perceptive, punctual, and impressively honoring the time and journey of each participant and yet capable of being fluid and open to adapt to the aliveness of each moment as it appears authentically in a group setting, which is not always easy to do."
