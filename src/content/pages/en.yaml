page_title: "Dan Healing Arts — Learn to Listen with Your Hands"
page_description: "Immersive trainings in deep, slow somatic bodywork — woven with presence, curiosity and care. A professional pathway in fascia-based bodywork."
hero:
  badge: "Dan Healing Arts"
  heading: "Learn to Listen\nwith Your Hands"
  subheading: "Immersive trainings in deep, slow somatic bodywork — woven with presence, curiosity and care. A professional pathway rooted in fascia and deep tissue work that transforms how you touch and how you listen."
  image: "/images/daniel-bodywork.jpg"
  imageAlt: "Daniel Wendt giving a deep somatic bodywork session"
  imagePosition: "center"
  cta_text: "Explore Trainings"
  cta_href: "/dates"
  secondary_cta_text: "About the Work"
  secondary_cta_href: "/about-the-work"
intro_p1: "Discover the transformative power of deep and slow somatic bodywork, both for giver and receiver, and fully connect to yourself and others - in sessions and in everyday life."
intro_p2: "Embark on a profound journey into your own and others' depths, and learn a full-on practical approach to touch and taking care of the human body - on a physical, emotional and energetic level."
intro_p3: "Learn to listen, not just with your ears but with your hands and your whole being, and cultivate the ability to create a space of deep mutual connection and trust - with your clients and your loved ones."
intro_p4: "Unleash your potential and support others in doing the same, by releasing stuck emotions, stagnant energy and subconscious patterns in the most natural and safe way - at the unique rhythm of the nervous system."
training_pathway:
  label: "Training Pathway"
  heading: "Two Levels of Learning"
  level_1:
    badge: "Level 1"
    href: "/level-1"
    image: "/images/level1/hero.jpg"
    imageAlt: "Level 1 — The Essence of Deep Touch"
    imagePosition: "center"
    heading: "The Essence of Deep Touch"
    description: "A foundational immersion into the art of slow, listening touch. You'll learn to work with fascia, breath and somatic awareness — building a complete framework for a deep bodywork practice and deepening your understanding of the body's psycho-emotional landscape."
    cta_text: "Learn more"
  level_2:
    badge: "Level 2"
    href: "/level-2"
    image: "/images/level2/hero.jpg"
    imageAlt: "Level 2 — An Evolution of Sensitivity"
    imagePosition: "center"
    heading: "An Evolution of Sensitivity"
    description: "A deeper exploration for those who have completed the foundation. You'll refine your perception, and deepen your capacity to feel the tissue's subtle intelligence — the quiet pulses of emotion and the energetic currents weaving through the body."
    cta_text: "Learn more"
