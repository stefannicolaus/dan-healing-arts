page_title: "Spain — An Evolution of Sensitivity | Dan Healing Arts"
page_description: "A 7-day Level 2 training in the Alpujarra mountains of southern Spain. Hidden Paradise retreat center, near Granada. 10–16 May, 2026."
og_image: "/images/spain/hero.jpg"
