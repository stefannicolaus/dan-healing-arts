page_title: "Tulum — The Essence of Deep Touch | Dan Healing Arts"
page_description: "A Myofascial Somatic Liberation Training at Casa Arkaana — an ecological retreat center in the jungle near Chemuyil, Yucatán Peninsula, Mexico. Dates to be announced."
