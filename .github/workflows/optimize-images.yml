name: Optimize Images

on:
  push:
    branches: [main]
    paths:
      - 'public/images/**'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force re-optimize all images (including already optimized)'
        required: false
        default: 'false'

jobs:
  optimize:
    runs-on: ubuntu-latest
    # Skip if commit was made by this action (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip optimize]')"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install sharp
        run: npm install sharp --save-dev

      - name: Optimize images
        run: node .github/scripts/optimize-images.js ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit optimized images
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/
          git commit -m "chore: optimize images [skip optimize]"
          git push
